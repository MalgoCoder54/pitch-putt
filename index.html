  <script type="text/babel">
const { useState, useMemo, useCallback } = React;

const PAR_PER_HOLE = 3;

const PHASES = { SETUP: 0, PLAY: 1, SUMMARY: 2 };

const fonts = `@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;400;600;700;800&display=swap');`;

function PitchAndPutt() {
const [phase, setPhase] = useState(PHASES.SETUP);
const [players, setPlayers] = useState([{ name: “” }, { name: “” }]);
const [holeConfig, setHoleConfig] = useState(
Array.from({ length: 9 }, (_, i) => ({ number: i + 1, times: 1 }))
);
const [scores, setScores] = useState({});
const [bonusHoles, setBonusHoles] = useState({});
const [activeHoleIdx, setActiveHoleIdx] = useState(0);
const [showConfig, setShowConfig] = useState(false);
const [imagePreview, setImagePreview] = useState(null);

// Build the flat list of “play holes” from config
const playHoles = useMemo(() => {
const holes = [];
holeConfig.forEach((h) => {
for (let t = 1; t <= h.times; t++) {
holes.push({
number: h.number,
rep: t,
totalReps: h.times,
key: `${h.number}-${t}`,
label: h.times > 1 ? `Buca ${h.number} (${t}/${h.times})` : `Buca ${h.number}`,
});
}
});
return holes;
}, [holeConfig]);

const totalPar = playHoles.length * PAR_PER_HOLE;

// Player management
const addPlayer = () => setPlayers([…players, { name: “” }]);
const removePlayer = (i) => {
if (players.length <= 1) return;
setPlayers(players.filter((_, idx) => idx !== i));
};
const updatePlayerName = (i, name) => {
const np = […players];
np[i] = { …np[i], name };
setPlayers(np);
};

// Hole config
const setHoleTimes = (holeIdx, times) => {
const nc = […holeConfig];
nc[holeIdx] = { …nc[holeIdx], times: Math.max(1, Math.min(5, times)) };
setHoleConfig(nc);
};

// Score management
const getScore = (playerIdx, holeKey) =>
scores[`${playerIdx}-${holeKey}`] || { strokes: 0, penalties: 0 };

const setScore = (playerIdx, holeKey, field, value) => {
const key = `${playerIdx}-${holeKey}`;
const current = scores[key] || { strokes: 0, penalties: 0 };
setScores({ …scores, [key]: { …current, [field]: Math.max(0, value) } });
};

// Bonus hole
const toggleBonusHole = (playerIdx, holeKey) => {
setBonusHoles((prev) => {
if (prev[playerIdx] === holeKey) {
const next = { …prev };
delete next[playerIdx];
return next;
}
return { …prev, [playerIdx]: holeKey };
});
};

// Calculations
const getPlayerTotal = (playerIdx, excludeBonus = false) => {
let total = 0;
playHoles.forEach((h) => {
if (excludeBonus && bonusHoles[playerIdx] === h.key) return;
const s = getScore(playerIdx, h.key);
total += s.strokes + s.penalties;
});
return total;
};

const getPlayerPar = (playerIdx) => {
const holesCount = bonusHoles[playerIdx]
? playHoles.length - 1
: playHoles.length;
return holesCount * PAR_PER_HOLE;
};

const getPlayerDiff = (playerIdx) => {
return getPlayerTotal(playerIdx, true) - getPlayerPar(playerIdx);
};

// Start game
const startGame = () => {
const validPlayers = players.filter((p) => p.name.trim());
if (validPlayers.length === 0) return;
setPlayers(validPlayers);
setScores({});
setBonusHoles({});
setActiveHoleIdx(0);
setPhase(PHASES.PLAY);
};

const currentHole = playHoles[activeHoleIdx];

// Build ranked players data
const getRankedPlayers = useCallback(() => {
return players
.map((p, i) => ({
name: p.name, idx: i,
diff: getPlayerDiff(i),
total: getPlayerTotal(i, true),
totalRaw: getPlayerTotal(i, false),
par: getPlayerPar(i),
bonusHole: bonusHoles[i] ? playHoles.find(h => h.key === bonusHoles[i]) : null,
}))
.sort((a, b) => a.diff - b.diff);
}, [players, scores, bonusHoles, playHoles]);

// Generate text note
const exportText = useCallback(() => {
const now = new Date();
const date = now.toLocaleDateString(“it-IT”, { day: “2-digit”, month: “long”, year: “numeric” });
const ranked = getRankedPlayers();
let txt = `⛳ PITCH & PUTT — ${date}\n`;
txt += `${"─".repeat(36)}\n\n`;
txt += `CLASSIFICA\n`;
ranked.forEach((p, rank) => {
const medal = rank === 0 ? “🏆” : `${rank + 1}°`;
const diffStr = p.diff > 0 ? `+${p.diff}` : p.diff === 0 ? “E” : `${p.diff}`;
txt += `${medal} ${p.name}  →  ${p.total} colpi  (${diffStr})\n`;
if (p.bonusHole) txt += `   Buca bonus: ${p.bonusHole.number}\n`;
});
txt += `\nPar: ${ranked[0]?.par || playHoles.length * PAR_PER_HOLE}\n`;
txt += `Buche giocate: ${playHoles.length}\n\n`;
txt += `${"─".repeat(36)}\n`;
txt += `DETTAGLIO BUCHE\n\n`;
// Header
const colW = 10;
txt += “Buca”.padEnd(8);
players.forEach(p => { txt += p.name.substring(0, colW).padEnd(colW + 2); });
txt += “\n”;
txt += `${"─".repeat(8 + players.length * (colW + 2))}\n`;
playHoles.forEach(h => {
const label = h.totalReps > 1 ? `${h.number}(${h.rep})` : `${h.number}`;
txt += label.padEnd(8);
players.forEach((*, pi) => {
const s = getScore(pi, h.key);
const total = s.strokes + s.penalties;
const isBonus = bonusHoles[pi] === h.key;
let cell = total === 0 ? “–” : `${total}`;
if (s.penalties > 0 && !isBonus) cell += `(${s.strokes}+${s.penalties})`;
if (isBonus) cell = `[${cell}★]`;
txt += cell.padEnd(colW + 2);
});
txt += “\n”;
});
txt += `${"─".repeat(8 + players.length * (colW + 2))}\n`;
txt += “TOT”.padEnd(8);
players.forEach((*, pi) => {
txt += `${getPlayerTotal(pi, true)}`.padEnd(colW + 2);
});
txt += “\n\n★ = buca bonus (esclusa dal conteggio)\n”;
// Copy to clipboard and try share
if (navigator.share) {
navigator.share({ title: “Pitch & Putt”, text: txt }).catch(() => {});
} else if (navigator.clipboard) {
navigator.clipboard.writeText(txt).then(() => {
alert(“Risultati copiati negli appunti!”);
}).catch(() => {
prompt(“Copia il testo:”, txt);
});
} else {
prompt(“Copia il testo:”, txt);
}
}, [players, scores, bonusHoles, playHoles]);

// Generate image
const exportImage = useCallback(() => {
const ranked = getRankedPlayers();
const now = new Date();
const date = now.toLocaleDateString(“it-IT”, { day: “2-digit”, month: “long”, year: “numeric” });
const dpr = window.devicePixelRatio || 2;
const W = 440;
const rowH = 32;
const headerH = 100;
const leaderH = ranked.length * 56 + 20;
const tableHeaderH = 36;
const tableH = tableHeaderH + playHoles.length * rowH + rowH + 20;
const footerH = 40;
const H = headerH + leaderH + tableH + footerH;

const canvas = document.createElement("canvas");
canvas.width = W * dpr;
canvas.height = H * dpr;
const ctx = canvas.getContext("2d");
ctx.scale(dpr, dpr);

// Background

grad.addColorStop(0, "#0c1a0c");
grad.addColorStop(1, "#0f2010");
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Header
ctx.fillStyle = "#ffffff";
ctx.font = "bold 22px 'Segoe UI', system-ui, sans-serif";
ctx.fillText("⛳ Pitch & Putt", 20, 38);

ctx.fillText(`${playHoles.length} buche · Par ${ranked[0]?.par || playHoles.length * 3}`, 20, 80);

// Leaderboard
let y = headerH;
ranked.forEach((p, rank) => {
  const isFirst = rank === 0;
  // Card bg
  ctx.fillStyle = isFirst ? "rgba(34,197,94,0.1)" : "rgba(255,255,255,0.05)";
  const rx = 20, ry = y, rw = W - 40, rh = 48, r = 10;
  ctx.beginPath();
  ctx.moveTo(rx + r, ry); ctx.lineTo(rx + rw - r, ry); ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
  ctx.lineTo(rx + rw, ry + rh - r); ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
  ctx.lineTo(rx + r, ry + rh); ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
  ctx.lineTo(rx, ry + r); ctx.quadraticCurveTo(rx, ry, rx + r, ry);
  ctx.fill();
  // Border
  ctx.strokeStyle = isFirst ? "rgba(34,197,94,0.3)" : "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;
  ctx.stroke();
  // Rank
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 16px 'Segoe UI', system-ui, sans-serif";
  ctx.fillText(rank === 0 ? "🏆" : `${rank + 1}°`, 34, y + 30);
  // Name
  ctx.font = "bold 15px 'Segoe UI', system-ui, sans-serif";
  ctx.fillText(p.name, 72, y + 24);
  // Detail
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.font = "11px 'Segoe UI', system-ui, sans-serif";
  const detail = `${p.total} colpi` + (p.bonusHole ? ` · Bonus: Buca ${p.bonusHole.number}` : "");
  ctx.fillText(detail, 72, y + 40);
  // Diff
  const diffStr = p.diff > 0 ? `+${p.diff}` : p.diff === 0 ? "E" : `${p.diff}`;
  ctx.fillStyle = p.diff < 0 ? "#22c55e" : p.diff === 0 ? "#e2e8f0" : "#ef4444";
  ctx.font = "bold 20px 'Segoe UI', system-ui, sans-serif";
  const diffW = ctx.measureText(diffStr).width;
  ctx.fillText(diffStr, W - 34 - diffW, y + 32);
  y += 56;
});

// Table
y += 20;
const colCount = players.length + 1;
const col0W = 52;
const colPW = (W - 40 - col0W) / players.length;
const tableX = 20;
// Table header
ctx.fillStyle = "rgba(255,255,255,0.3)";
ctx.font = "bold 10px 'Segoe UI', system-ui, sans-serif";
ctx.fillText("BUCA", tableX + 6, y + 14);
players.forEach((p, i) => {
  const name = p.name.length > 8 ? p.name.substring(0, 7) + "…" : p.name;
  ctx.fillText(name.toUpperCase(), tableX + col0W + i * colPW + 6, y + 14);
});
y += tableHeaderH;
ctx.strokeStyle = "rgba(255,255,255,0.1)";
ctx.lineWidth = 0.5;
ctx.beginPath(); ctx.moveTo(tableX, y - 14); ctx.lineTo(W - 20, y - 14); ctx.stroke();

// Rows
playHoles.forEach((h, hi) => {
  if (hi % 2 === 0) {
    ctx.fillStyle = "rgba(255,255,255,0.02)";
    ctx.fillRect(tableX, y - 6, W - 40, rowH);
  }
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = "13px 'Segoe UI', system-ui, sans-serif";
  const lbl = h.totalReps > 1 ? `${h.number} (${h.rep})` : `${h.number}`;
  ctx.fillText(lbl, tableX + 6, y + 14);
  players.forEach((_, pi) => {
    const s = getScore(pi, h.key);
    const total = s.strokes + s.penalties;
    const isBonus = bonusHoles[pi] === h.key;
    const diff = total - PAR_PER_HOLE;
    if (isBonus) {
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.font = "13px 'Segoe UI', system-ui, sans-serif";
      const txt = total === 0 ? "–" : `${total} ★`;
      ctx.fillText(txt, tableX + col0W + pi * colPW + 6, y + 14);
    } else {
      ctx.fillStyle = total === 0 ? "rgba(255,255,255,0.15)" : diff < 0 ? "#22c55e" : diff === 0 ? "#e2e8f0" : "#ef4444";
      ctx.font = "bold 13px 'Segoe UI', system-ui, sans-serif";
      let cell = total === 0 ? "–" : `${total}`;
      if (s.penalties > 0) cell += ` (${s.strokes}+${s.penalties})`;
      ctx.fillText(cell, tableX + col0W + pi * colPW + 6, y + 14);
    }
  });
  y += rowH;
});
// Total row
ctx.strokeStyle = "#22c55e";
ctx.lineWidth = 1.5;
ctx.beginPath(); ctx.moveTo(tableX, y - 4); ctx.lineTo(W - 20, y - 4); ctx.stroke();
y += 4;
ctx.fillStyle = "#ffffff";
ctx.font = "bold 14px 'Segoe UI', system-ui, sans-serif";
ctx.fillText("TOT", tableX + 6, y + 14);
players.forEach((_, pi) => {
  ctx.fillText(`${getPlayerTotal(pi, true)}`, tableX + col0W + pi * colPW + 6, y + 14);
});

// Footer
y += rowH + 10;
ctx.fillStyle = "rgba(255,255,255,0.2)";
ctx.font = "10px 'Segoe UI', system-ui, sans-serif";
ctx.fillText("★ = buca bonus (esclusa dal conteggio)", tableX, y + 10);

// Show as preview overlay
const dataUrl = canvas.toDataURL("image/png");
setImagePreview(dataUrl);

  {/* Header */}
  <div style={styles.header}>
    <div style={styles.headerInner}>
      <div style={styles.logoMark}>⛳</div>
      <div>
        <h1 style={styles.title}>Pitch & Putt</h1>
        <p style={styles.subtitle}>Segnapunti</p>
      </div>
    </div>
    {phase === PHASES.PLAY && (
      <button style={styles.summaryBtn} onClick={() => setPhase(PHASES.SUMMARY)}>
        Classifica
      </button>
    )}
    {phase === PHASES.SUMMARY && (
      <button style={styles.summaryBtn} onClick={() => setPhase(PHASES.PLAY)}>
        ← Partita
      </button>
    )}
  </div>

  {/* SETUP PHASE */}
  {phase === PHASES.SETUP && (
    <div style={styles.setupContainer}>
      {/* Players */}
      <div style={styles.card}>
        <h2 style={styles.cardTitle}>Giocatori</h2>
        <div style={styles.playersList}>
          {players.map((p, i) => (
            <div key={i} style={styles.playerRow}>
              <div style={styles.playerBadge}>{i + 1}</div>
              <input
                style={styles.playerInput}
                placeholder={`Giocatore ${i + 1}`}
                value={p.name}
                onChange={(e) => updatePlayerName(i, e.target.value)}
              />
              {players.length > 1 && (
                <button style={styles.removeBtn} onClick={() => removePlayer(i)}>✕</button>
              )}
            </div>
          ))}
        </div>
        <button style={styles.addPlayerBtn} onClick={addPlayer}>
          + Aggiungi giocatore
        </button>
      </div>

      {/* Hole Config */}
      <div style={styles.card}>
        <div style={styles.cardHeaderRow}>
          <h2 style={styles.cardTitle}>Configurazione buche</h2>
          <button
            style={styles.configToggle}
            onClick={() => setShowConfig(!showConfig)}
          >
            {showConfig ? "Chiudi" : "Personalizza"}
          </button>
        </div>
        <p style={styles.configHint}>
          {playHoles.length} buche totali · Par {totalPar}
        </p>
        {showConfig && (
          <div style={styles.holesGrid}>
            {holeConfig.map((h, i) => (
              <div key={i} style={styles.holeConfigItem}>
                <span style={styles.holeLabel}>Buca {h.number}</span>
                <div style={styles.timesControl}>
                  <button
                    style={styles.timesBtn}
                    onClick={() => setHoleTimes(i, h.times - 1)}
                  >−</button>
                  <span style={styles.timesValue}>×{h.times}</span>
                  <button
                    style={styles.timesBtn}
                    onClick={() => setHoleTimes(i, h.times + 1)}
                  >+</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Start */}
      <button
        style={{
          ...styles.startBtn,
          opacity: players.some((p) => p.name.trim()) ? 1 : 0.4,
        }}
        onClick={startGame}
        disabled={!players.some((p) => p.name.trim())}
      >
        Inizia partita ⛳
      </button>
    </div>
  )}

  {/* PLAY PHASE */}
  {phase === PHASES.PLAY && (
    <div style={styles.playContainer}>
      {/* Hole navigation */}
      <div style={styles.holeNav}>
        <div style={styles.holeNavScroll}>
          {playHoles.map((h, i) => {
            const allFilled = players.every((_, pi) => {
              const s = getScore(pi, h.key);
              return s.strokes > 0;
            });
            return (
              <button
                key={h.key}
                style={{
                  ...styles.holeNavBtn,
                  ...(i === activeHoleIdx ? styles.holeNavBtnActive : {}),
                  ...(allFilled && i !== activeHoleIdx ? styles.holeNavBtnDone : {}),
                }}
                onClick={() => setActiveHoleIdx(i)}
              >
                <span style={styles.holeNavNum}>{h.number}</span>
                {h.totalReps > 1 && (
                  <span style={styles.holeNavRep}>{h.rep}/{h.totalReps}</span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* Current hole */}
      {currentHole && (
        <div style={styles.currentHoleHeader}>
          <h2 style={styles.currentHoleTitle}>{currentHole.label}</h2>
          <span style={styles.parBadge}>Par {PAR_PER_HOLE}</span>
        </div>
      )}

      {/* Player scores for current hole */}
      <div style={styles.scoresContainer}>
        {players.map((p, pi) => {
          const s = getScore(pi, currentHole?.key);
          const totalShots = s.strokes + s.penalties;
          const diff = totalShots - PAR_PER_HOLE;
          const isBonus = bonusHoles[pi] === currentHole?.key;

          return (
            <div key={pi} style={{ ...styles.playerCard, ...(isBonus ? styles.playerCardBonus : {}) }}>
              <div style={styles.playerCardHeader}>
                <div style={styles.playerCardName}>
                  <span style={styles.playerDot(pi)} />
                  {p.name}
                </div>
                {totalShots > 0 && (
                  <span
                    style={{
                      ...styles.diffBadge,
                      color: diff < 0 ? "#22c55e" : diff === 0 ? "#94a3b8" : "#ef4444",
                      background: diff < 0 ? "rgba(34,197,94,0.12)" : diff === 0 ? "rgba(148,163,184,0.12)" : "rgba(239,68,68,0.12)",
                    }}
                  >
                    {diff > 0 ? `+${diff}` : diff === 0 ? "Par" : diff}
                  </span>
                )}
              </div>

              {/* Strokes */}
              <div style={styles.scoreRow}>
                <span style={styles.scoreLabel}>Colpi</span>
                <div style={styles.counterGroup}>
                  <button
                    style={styles.counterBtn}
                    onClick={() => setScore(pi, currentHole.key, "strokes", s.strokes - 1)}
                  >−</button>
                  <span style={styles.counterValue}>{s.strokes}</span>
                  <button
                    style={styles.counterBtnPlus}
                    onClick={() => setScore(pi, currentHole.key, "strokes", s.strokes + 1)}
                  >+</button>
                </div>
              </div>

              {/* Penalties */}
              <div style={styles.scoreRow}>
                <span style={styles.scoreLabel}>
                  Penalità
                  <span style={styles.penaltyHint}> (+2 per infrazione)</span>
                </span>
                <div style={styles.counterGroup}>
                  <button
                    style={styles.counterBtn}
                    onClick={() => setScore(pi, currentHole.key, "penalties", s.penalties - 2)}
                  >−2</button>
                  <span style={{ ...styles.counterValue, color: s.penalties > 0 ? "#ef4444" : undefined }}>
                    {s.penalties > 0 ? `+${s.penalties}` : "0"}
                  </span>
                  <button
                    style={{ ...styles.counterBtnPlus, background: "rgba(239,68,68,0.2)", color: "#ef4444" }}
                    onClick={() => setScore(pi, currentHole.key, "penalties", s.penalties + 2)}
                  >+2</button>
                </div>
              </div>

              {/* Bonus toggle */}
              <button
                style={{
                  ...styles.bonusBtn,
                  ...(isBonus ? styles.bonusBtnActive : {}),
                }}
                onClick={() => toggleBonusHole(pi, currentHole.key)}
              >
                {isBonus ? "★ Buca bonus attiva" : "☆ Imposta come buca bonus"}
              </button>

              {/* Total for hole */}
              {totalShots > 0 && (
                <div style={styles.holeTotalRow}>
                  <span>Totale buca:</span>
                  <strong>{totalShots}</strong>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Navigation arrows */}
      <div style={styles.navArrows}>
        <button
          style={{ ...styles.navArrowBtn, opacity: activeHoleIdx > 0 ? 1 : 0.3 }}
          onClick={() => setActiveHoleIdx(Math.max(0, activeHoleIdx - 1))}
          disabled={activeHoleIdx === 0}
        >
          ← Precedente
        </button>
        {activeHoleIdx < playHoles.length - 1 ? (
          <button
            style={styles.navArrowBtnNext}
            onClick={() => setActiveHoleIdx(activeHoleIdx + 1)}
          >
            Prossima →
          </button>
        ) : (
          <button
            style={styles.navArrowBtnFinish}
            onClick={() => setPhase(PHASES.SUMMARY)}
          >
            Classifica →
          </button>
        )}
      </div>
    </div>
  )}

  {/* SUMMARY PHASE */}
  {phase === PHASES.SUMMARY && (
    <div style={styles.summaryContainer}>
      <h2 style={styles.summaryTitle}>Classifica Finale</h2>

      {/* Leaderboard */}
      {players
        .map((p, i) => ({ name: p.name, idx: i, diff: getPlayerDiff(i), total: getPlayerTotal(i, true), par: getPlayerPar(i) }))
        .sort((a, b) => a.diff - b.diff)
        .map((p, rank) => (
          <div key={p.idx} style={{ ...styles.leaderRow, ...(rank === 0 ? styles.leaderRowFirst : {}) }}>
            <div style={styles.leaderRank}>
              {rank === 0 ? "🏆" : `${rank + 1}°`}
            </div>
            <div style={styles.leaderInfo}>
              <span style={styles.leaderName}>{p.name}</span>
              <span style={styles.leaderDetail}>
                {p.total} colpi · Par {p.par}
                {bonusHoles[p.idx] && (
                  <> · Bonus: Buca {playHoles.find(h => h.key === bonusHoles[p.idx])?.number}</>
                )}
              </span>
            </div>
            <div style={{
              ...styles.leaderDiff,
              color: p.diff < 0 ? "#22c55e" : p.diff === 0 ? "#e2e8f0" : "#ef4444",
            }}>
              {p.diff > 0 ? `+${p.diff}` : p.diff === 0 ? "E" : p.diff}
            </div>
          </div>
        ))}

      {/* Detailed scorecard */}
      <div style={styles.scorecardSection}>
        <h3 style={styles.scorecardTitle}>Dettaglio buche</h3>
        <div style={styles.scorecardScroll}>
          <table style={styles.table}>
            <thead>
              <tr>
                <th style={styles.th}>Buca</th>
                {players.map((p, i) => (
                  <th key={i} style={styles.th}>{p.name}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {playHoles.map((h) => (
                <tr key={h.key}>
                  <td style={styles.td}>
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      {h.number}
                      {h.totalReps > 1 && <span style={{ fontSize: 10, opacity: 0.5 }}>({h.rep})</span>}
                    </div>
                  </td>
                  {players.map((_, pi) => {
                    const s = getScore(pi, h.key);
                    const total = s.strokes + s.penalties;
                    const isBonus = bonusHoles[pi] === h.key;
                    const diff = total - PAR_PER_HOLE;
                    return (
                      <td key={pi} style={{
                        ...styles.td,
                        ...(isBonus ? { textDecoration: "line-through", opacity: 0.4 } : {}),
                        color: total === 0 ? "rgba(255,255,255,0.2)" : diff < 0 ? "#22c55e" : diff === 0 ? "#e2e8f0" : "#ef4444",
                      }}>
                        {total === 0 ? "–" : total}
                        {s.penalties > 0 && !isBonus && (
                          <span style={{ fontSize: 10, color: "#ef4444", marginLeft: 2 }}>
                            ({s.strokes}+{s.penalties})
                          </span>
                        )}
                        {isBonus && <span style={{ fontSize: 10, marginLeft: 4 }}>★</span>}
                      </td>
                    );
                  })}
                </tr>
              ))}
              <tr>
                <td style={{ ...styles.td, ...styles.totalRow }}>TOT</td>
                {players.map((_, pi) => (
                  <td key={pi} style={{ ...styles.td, ...styles.totalRow }}>
                    {getPlayerTotal(pi, true)}
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Export */}
      <div style={styles.exportSection}>
        <h3 style={styles.exportTitle}>Esporta risultati</h3>
        <div style={styles.exportBtns}>
          <button style={styles.exportImgBtn} onClick={exportImage}>
            📸 Salva immagine
          </button>
          <button style={styles.exportTxtBtn} onClick={exportText}>
            📝 Nota di testo
          </button>
        </div>
      </div>

      {/* Actions */}
      <div style={styles.summaryActions}>
        <button style={styles.backToPlayBtn} onClick={() => setPhase(PHASES.PLAY)}>
          ← Torna alla partita
        </button>
        <button style={styles.newGameBtn} onClick={() => { setPhase(PHASES.SETUP); setScores({}); setBonusHoles({}); }}>
          Nuova partita
        </button>
      </div>
    </div>
  )}

  {/* Image Preview Overlay */}
  {imagePreview && (
    <div style={styles.overlay} onClick={() => setImagePreview(null)}>
      <div style={styles.overlayContent} onClick={(e) => e.stopPropagation()}>
        <p style={styles.overlayHint}>Tieni premuto sull'immagine per salvarla</p>
        <img
          src={imagePreview}
          alt="Scorecard"
          style={styles.overlayImg}
        />
        <div style={styles.overlayActions}>
          <button
            style={styles.overlayShareBtn}
            onClick={async () => {
              try {
                const res = await fetch(imagePreview);
                const blob = await res.blob();
                const file = new File([blob], "pitch-putt.png", { type: "image/png" });
                if (navigator.share && navigator.canShare?.({ files: [file] })) {
                  await navigator.share({ files: [file], title: "Pitch & Putt" });
                } else if (navigator.share) {
                  await navigator.share({ title: "Pitch & Putt", text: "Risultati Pitch & Putt", url: imagePreview });
                } else {
                  alert("Condivisione non disponibile. Tieni premuto sull'immagine per salvarla.");
                }
              } catch (e) {}
            }}
          >
            📤 Condividi
          </button>
          <button style={styles.overlayCloseBtn} onClick={() => setImagePreview(null)}>
            ✕ Chiudi
          </button>
        </div>
      </div>
    </div>
  )}
</div>
```
